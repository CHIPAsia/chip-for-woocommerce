name: WordPress Plugin Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Tier 1: Build + PHP compatibility (run in parallel) ───

  build:
    name: Build Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '^24.11.0'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Prepare plugin folder for CI
        run: |
          mkdir -p ci-build/chip-for-woocommerce
          # Copy source files (respects .gitignore)
          git archive HEAD | tar -x -C ci-build/chip-for-woocommerce
          # Overlay built artifacts that are gitignored
          mkdir -p ci-build/chip-for-woocommerce/assets/js/frontend
          cp assets/js/frontend/* ci-build/chip-for-woocommerce/assets/js/frontend/
          echo "✅ Build artifacts prepared"
          ls -la ci-build/chip-for-woocommerce/assets/js/frontend/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: chip-for-woocommerce-build
          path: ci-build/
          retention-days: 5

  php-compatibility:
    name: PHP ${{ matrix.php-version }} Compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.2', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install PHPCompatibility
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev squizlabs/php_codesniffer dealerdirect/phpcodesniffer-composer-installer phpcompatibility/phpcompatibility-wp:"*"
          echo "$(composer global config bin-dir --absolute)" >> $GITHUB_PATH

      - name: Verify PHPCS Standards
        run: phpcs -i

      - name: Check PHP ${{ matrix.php-version }} Compatibility
        run: |
          phpcs --standard=PHPCompatibilityWP --runtime-set testVersion ${{ matrix.php-version }} --extensions=php --ignore=vendor,node_modules,assets/js/frontend .

  # ─── Tier 2: PHPCS (depends on nothing, runs in parallel) ───

  phpcs:
    name: PHP CodeSniffer (WordPress Standards)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install WordPress Coding Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev squizlabs/php_codesniffer dealerdirect/phpcodesniffer-composer-installer wp-coding-standards/wpcs:"^3.0"
          echo "$(composer global config bin-dir --absolute)" >> $GITHUB_PATH

      - name: Verify PHPCS Standards
        run: phpcs -i

      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml .
        continue-on-error: false

  # ─── Tier 3: Plugin Check (needs build artifact) ───

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    needs: [build, php-compatibility, phpcs]

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: chip-for-woocommerce-build
          path: ./build

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/chip-for-woocommerce'
          exclude-directories: 'vendor,node_modules'
