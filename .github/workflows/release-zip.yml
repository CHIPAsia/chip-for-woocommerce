name: Create Release Zip

on:
  release:
    types: [created]

jobs:
  build-and-release:
    name: Build and Upload Release Zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '^24.11.0'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Prepare plugin folder
        run: |
          mkdir -p dist/chip-for-woocommerce
          git archive HEAD | tar -x -C dist/chip-for-woocommerce
          mkdir -p dist/chip-for-woocommerce/assets/js/frontend
          cp assets/js/frontend/* dist/chip-for-woocommerce/assets/js/frontend/
          echo "✅ Prepared plugin folder"
          ls -la dist/chip-for-woocommerce/assets/js/frontend/

      - name: Create zip file
        run: |
          cd dist
          zip -r ../chip-for-woocommerce.zip chip-for-woocommerce
          cd ..
          echo "✅ Created zip file"
          ls -la chip-for-woocommerce.zip

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" chip-for-woocommerce.zip --clobber
