name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.4)'
        required: true
        type: string
      create_tag:
        description: 'Create git tag immediately (auto-triggers deploy). Uncheck to test in SVN trunk first.'
        required: false
        type: boolean
        default: true

jobs:
  bump-and-tag:
    name: Bump Version, Generate Changelog, and Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Error: Version must be in X.Y.Z format (e.g., 2.0.4)"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - name: Check version does not already exist
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "❌ Error: Tag v${VERSION} already exists."
            exit 1
          fi
          if grep -q "^= ${VERSION} " changelog.txt; then
            echo "❌ Error: Changelog entry for ${VERSION} already exists."
            exit 1
          fi
          echo "✅ Version ${VERSION} is new"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Get previous tag
        id: prev_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "📎 Previous tag: ${PREVIOUS_TAG:-none}"

      - name: Get diff since previous tag
        id: diff
        run: |
          PREVIOUS_TAG="${{ steps.prev_tag.outputs.tag }}"
          if [ -n "$PREVIOUS_TAG" ]; then
            git diff "$PREVIOUS_TAG..HEAD" --stat > diff.txt
            echo "" >> diff.txt
            git diff "$PREVIOUS_TAG..HEAD" >> diff.txt
          else
            echo "No previous tag found; using last 20 commits as context." > diff.txt
            echo "" >> diff.txt
            git log --pretty=format:"- %s" --no-merges -n 20 >> diff.txt
          fi
          echo "📋 Diff since last release ($(wc -c < diff.txt) bytes):"
          head -n 50 diff.txt

      - name: Generate AI changelog
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ vars.AI_API_URL }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gemini-3-flash-preview:cloud' }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          python scripts/generate_release_notes.py diff.txt "$VERSION" > changelog_entry.md
          echo "📝 AI-generated changelog entry:"
          cat changelog_entry.md

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          bash -x ./scripts/bump-version.sh --yes --changelog-file changelog_entry.md "$VERSION"

      - name: Commit version bump
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git commit -m "Bump version to ${VERSION}"

      - name: Push to main
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git push origin main
          echo "✅ Pushed commit to main"

      - name: Create git tag
        if: github.event.inputs.create_tag == 'true'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag -a "v${VERSION}" -m "Release ${VERSION}"
          git push origin "v${VERSION}"
          echo "✅ Created and pushed tag v${VERSION}"

      - name: Summary
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CREATE_TAG="${{ github.event.inputs.create_tag }}"
          echo ""
          echo "═══════════════════════════════════════"
          echo "  Release ${VERSION} prepared"
          echo "═══════════════════════════════════════"
          echo ""
          echo "What happened:"
          echo "  • AI generated changelog from commits"
          echo "  • Version bumped in all files"
          echo "  • changelog.txt updated"
          echo "  • Commit pushed to main"
          if [ "$CREATE_TAG" = "true" ]; then
            echo "  • Tag v${VERSION} created and pushed"
            echo ""
            echo "Next (automatic):"
            echo "  • deploy.yml triggers on tag v${VERSION}"
            echo "  • Deploys to WordPress.org SVN"
            echo "  • Creates GitHub release with AI notes"
          else
            echo ""
            echo "Next (manual):"
            echo "  1. Run deploy.yml with stage=trunk to test in SVN"
            echo "  2. After testing, run deploy.yml with stage=release"
            echo "     OR create tag v${VERSION} manually to auto-trigger deploy"
          fi
